          echo "Timestamp dir: $TIMESTAMP_DIR"
          SikrakenDevOps/ReportScripts/create_category_test_run_table.sh "$TIMESTAMP_DIR"
          echo "timestamp_dir=$TIMESTAMP_DIR" >> $GITHUB_OUTPUT
        id: generate-report

      - name: Replace File Paths With S3 URLs
        run: |
          TIMESTAMP_DIR="${{ steps.generate-report.outputs.timestamp_dir }}"
          TIMESTAMP_NAME=$(basename "$TIMESTAMP_DIR")
          python SikrakenDevOps/SikrakenPythonScripts/filepath_to_url_processor.py "$TIMESTAMP_DIR" --run_folder "$TIMESTAMP_NAME" --s3_bucket "${{ vars.S3_BUCKET_NAME }}" --category "${{ vars.CATEGORY }}"
      - name: Upload Report HTML To S3
        run: |
          TIMESTAMP_DIR="${{ steps.generate-report.outputs.timestamp_dir }}"
          TIMESTAMP_NAME=$(basename "$TIMESTAMP_DIR")
          aws s3 cp "$TIMESTAMP_DIR/category_test_run_results.html" \
            s3://${{ vars.S3_BUCKET_NAME }}/${{ vars.CATEGORY }}/$TIMESTAMP_NAME/category_test_run_results.html --content-type text/html
      - name: Invoke Lambda Function For Processing
        run: |
          aws lambda invoke --function-name ${{ secrets.LAMBDA_NAME }} \
          --cli-binary-format raw-in-base64-out \
          --payload '{ "Category": "${{ vars.CATEGORY }}", "Bucket": "${{ vars.S3_BUCKET_NAME }}" }' response.json
          cat response.json
          URL=$(jq -r '.body | fromjson | .url' response.json) #Using the jq JSON command line processor to isolate the value of the url key
          echo "$URL" | awk -F '?' '{print $1}' #Using the text processor awk to try and remove the unnecessary parts of the html url

